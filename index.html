<!DOCTYPE html>
<html>
  <body style="background:#222;">
    <canvas id="game" width="500" height="300" style="background:#000;display:block;margin:auto;margin-top:40px"></canvas>
    <script>
      let c = document.getElementById('game');
      let x = 30, y = 30, dx = 2, dy = 2, r = 10;
      function draw() {
        let ctx = c.getContext('2d');
        ctx.clearRect(0,0,500,300);
        ctx.beginPath();
        ctx.arc(x, y, r, 0, 2 * Math.PI);
        ctx.fillStyle = "#FF0";
        ctx.fill();
        x += dx; y += dy;
        if (x < r || x > 500 - r) dx = -dx;
        if (y < r || y > 300 - r) dy = -dy;
        requestAnimationFrame(draw);
      }
      draw();
    </script>
  </body>
</html>
